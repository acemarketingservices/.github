name: Repository baseline

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  policy:
    name: policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
      - name: Verify patch integrity
        run: git diff --check "origin/${{ github.base_ref }}...HEAD"
