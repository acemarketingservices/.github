name: Reusable Ruff

on:
  workflow_call:
    inputs:
      python-version:
        description: Python version used to run Ruff
        required: false
        default: "3.12"
        type: string
      ruff-version:
        description: Exact Ruff release to install
        required: false
        default: "0.15.21"
        type: string
      paths:
        description: Space-separated paths passed to `ruff check`
        required: false
        default: "."
        type: string
      enforce:
        description: Fail the job when Ruff reports findings
        required: false
        default: true
        type: boolean

permissions:
  contents: read

jobs:
  ruff:
    name: ruff
    runs-on: ubuntu-latest
    continue-on-error: ${{ !inputs.enforce }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ inputs.python-version }}
      - name: Install Ruff
        env:
          RUFF_VERSION: ${{ inputs.ruff-version }}
        run: python -m pip install "ruff==$RUFF_VERSION"
      - name: Run Ruff
        env:
          RUFF_PATHS: ${{ inputs.paths }}
        run: ruff check $RUFF_PATHS
