name: Reusable Ruff

on:
  workflow_call:
    inputs:
      python-version:
        description: Python version used to run Ruff
        required: false
        default: "3.12"
        type: string
      ruff-version:
        description: Exact Ruff release to install
        required: false
        default: "0.15.21"
        type: string
      paths:
        description: Space-separated paths passed to `ruff check`
        required: false
        default: "."
        type: string
      enforce:
        description: Fail the job when Ruff reports findings
        required: false
        default: true
        type: boolean

permissions:
  contents: read

jobs:
  ruff:
    name: ruff
    runs-on: ubuntu-latest
    continue-on-error: ${{ !inputs.enforce }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ inputs.python-version }}
      - name: Install Ruff
        env:
          RUFF_VERSION: ${{ inputs.ruff-version }}
        run: python -m pip install "ruff==$RUFF_VERSION"
      - name: Run Ruff
        env:
          RUFF_PATHS: ${{ inputs.paths }}
        run: ruff check $RUFF_PATHS
