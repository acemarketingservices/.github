name: Reusable ShellCheck

on:
  workflow_call:
    inputs:
      paths:
        description: Space-separated directories searched for shell files
        required: false
        default: "."
        type: string
      exclusions:
        description: Comma-separated ShellCheck rule exclusions
        required: false
        default: "SC1007"
        type: string

permissions:
  contents: read

jobs:
  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Run ShellCheck
        env:
          SEARCH_PATHS: ${{ inputs.paths }}
          EXCLUSIONS: ${{ inputs.exclusions }}
        run: |
          set +e
          fail=0
          while IFS= read -r file; do
            shellcheck -S warning -e "$EXCLUSIONS" "$file" || fail=1
          done < <(find $SEARCH_PATHS -type f \( -name '*.sh' -o -name '*.bash' -o -path 'bin/*session' -o -path 'bin/*bootstrap*' \) 2>/dev/null)
          exit $fail
